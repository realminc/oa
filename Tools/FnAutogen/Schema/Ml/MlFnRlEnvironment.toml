namespace = "OaFnRlEnvironment"
category = "RlEnvironment"
file_category = "RlEnvironment"
file_prefix = "FnRlEnvironment"
cpp_subdir = "Rl"

[[ops]]
name = "CartPoleReset"
kind = "session_command"
body = "manual_context"
generate_declaration = false
kernel_forward = "RlCartPoleReset"
notes = "Reset all CartPole lanes or only completed lanes with deterministic seeded state. Lane count is shape-derived; the private session command validates the heterogeneous state dtypes behind the frozen match_input sentinel."

[ops.kernel]
id_prefix = "Ml"
id_local = 274
category = "Ml"
origin = "oa"
source = "Rl/Environment/RlCartPoleReset"

[ops.contract]
value_validation = "session_command"
input_kinds = ["matrix", "matrix", "matrix", "matrix"]
output_kinds = ["matrix", "matrix", "matrix", "matrix"]
shape_rule = "explicit"
dtype_rule = "match_input"
effects = ["read_inputs", "write_outputs"]
mutated_inputs = [0, 1, 2, 3]
output_alias_inputs = [0, 1, 2, 3]
differentiation = "none"
lowering = "dispatch"
control_flow = "conditional"
attributes = [
    { name = "Seed", kind = "unsigned_integer" },
    { name = "OnlyCompleted", kind = "boolean" },
]

[[ops]]
name = "CartPoleStep"
kind = "session_command"
body = "manual_context"
generate_declaration = false
kernel_forward = "RlCartPoleStep"
notes = "Advance one vectorized CartPole transition while preserving pre-action observations. Lane count is shape-derived. DynamicsIdentity is versioned and covers every behavior-changing step field, including the mass and pole-length values folded behind the inspectable attribute subset; the private command validates exact heterogeneous value dtypes."

[ops.kernel]
id_prefix = "Ml"
id_local = 275
category = "Ml"
origin = "oa"
source = "Rl/Environment/RlCartPoleStep"

[ops.contract]
value_validation = "session_command"
input_kinds = ["matrix", "matrix", "matrix", "matrix"]
output_kinds = ["matrix", "matrix", "matrix", "matrix", "matrix", "matrix", "matrix"]
shape_rule = "explicit"
dtype_rule = "match_input"
effects = ["read_inputs", "write_outputs"]
mutated_inputs = [1, 2, 3]
output_alias_inputs = [-1, 1, -1, -1, -1, 2, 3]
differentiation = "none"
lowering = "dispatch"
control_flow = "conditional"
attributes = [
    { name = "DynamicsVersion", kind = "unsigned_integer" },
    { name = "DynamicsIdentity", kind = "unsigned_integer" },
    { name = "MaxEpisodeSteps", kind = "unsigned_integer" },
    { name = "Gravity", kind = "float" },
    { name = "ForceMagnitude", kind = "float" },
    { name = "TimeStep", kind = "float" },
    { name = "PositionThreshold", kind = "float" },
    { name = "AngleThresholdRadians", kind = "float" },
]

[[ops]]
