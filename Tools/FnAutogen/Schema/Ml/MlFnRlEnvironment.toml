kind = "session_command"
body = "manual_context"
generate_declaration = false
kernel_forward = "RlLunarLander3dReset"
notes = "Reset every Lunar Lander 3D lane or only completed lanes. The session owns immutable serialized configuration and terrain values, packed FP32/UInt32 state, deterministic per-lane episode counters, and the current 33-value observation. Exact heterogeneous shapes and dtypes are validated before this private command records."

[ops.kernel]
id_prefix = "Ml"
