kernel_forward = "RlLunarLander3dStep"
notes = "Advance one vectorized FP32 Lunar Lander 3D transition while preserving the pre-action 33-value observation. A lane-local UInt8 external-stop mask truncates valid-action lanes without advancing their episode step; invalid Discrete(8) actions take precedence and terminate only their lane with the configured failure penalty. ConfigIdentity covers every behavior-changing scalar reference field; the private command validates exact heterogeneous shapes and dtypes."

