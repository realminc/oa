# OaFn schema — Ml/FnMatrix normalization ops (3).
#
# This is the *source of truth* for ML normalization functions. The generator
# emits .h declarations, .cpp implementations, and .slang shaders from this file.
# See Tools/FnAutogen/README.md and Tools/FnAutogen/oafnautogen.py.
#
# Normalization operations are per-row operations that normalize across features.
# Each has a forward kernel and a backward kernel for autograd.

# --- RmsNorm -----------------------------------------------------------------
[[ops]]
name           = "RmsNorm"
category       = "Norm"
kind           = "unary_scalar"
kernel_forward = "RmsNorm"
kernel_backward = "RmsNormBwd"
slang_path     = "Ml/Nn/Norm"
log_component  = "ML"
notes          = "Weighted root mean square normalization over the last dimension: Out = (A / sqrt(mean(A^2) + Eps)) * Weight."
body           = "manual_context"
scalar_param   = { name = "Eps", type = "OaF32", push_field = "Eps" }
api_params     = [
    "const OaMatrix& InSelf",
    "const OaMatrix& InWeight",
    "OaF32 InEps",
]
api_return     = "OaMatrix"

[ops.contract]
input_kinds         = ["matrix", "matrix"]
output_kinds        = ["matrix"]
shape_rule          = "match_input"
dtype_rule          = "match_input"
effects             = ["read_inputs", "write_outputs"]
mutated_inputs      = []
output_alias_inputs = [-1]
control_flow        = "straight_line"
differentiation     = "reverse"
lowering            = "dispatch"

[ops.autograd]
grad_class   = "OaGradRmsNorm"
inputs       = ["InSelf", "InWeight"]
saved        = ["InSelf", "InWeight", "Out", "Out"]
formula      = "manual"
attach       = "standard"
output_shape = true
state        = [{ member = "Eps_", source = "InEps", type = "OaF32" }]

# --- LayerNorm ---------------------------------------------------------------
[[ops]]
name           = "LayerNorm"
category       = "Norm"
kind           = "unary_scalar"
kernel_forward = "LayerNorm"
kernel_backward = "LayerNormBwd"
slang_path     = "Ml/Nn/Norm"
log_component  = "ML"
notes          = "Affine layer normalization over the last dimension: Out = ((A - mean(A)) / sqrt(var(A) + Eps)) * Weight + Bias."
body           = "manual_context"
scalar_param   = { name = "Eps", type = "OaF32", push_field = "Eps" }
api_params     = [
    "const OaMatrix& InSelf",
    "const OaMatrix& InWeight",
    "const OaMatrix& InBias",
    "OaF32 InEps",
]
api_return     = "OaMatrix"

[ops.contract]
input_kinds         = ["matrix", "matrix", "matrix"]
output_kinds        = ["matrix"]
shape_rule          = "match_input"
dtype_rule          = "match_input"
effects             = ["read_inputs", "write_outputs"]
mutated_inputs      = []
output_alias_inputs = [-1]
control_flow        = "straight_line"
differentiation     = "reverse"
lowering            = "dispatch"

[ops.autograd]
grad_class   = "OaGradLayerNorm"
inputs       = ["InSelf", "InWeight", "InBias"]
saved        = ["InSelf", "InWeight", "InBias", "Out"]
formula      = "manual"
attach       = "standard"
output_shape = true
state        = [{ member = "Eps_", source = "InEps", type = "OaF32" }]

# --- ResidualRmsNorm ---------------------------------------------------------
[[ops]]
name           = "ResidualRmsNorm"
category       = "Norm"
kind           = "binary"
kernel_forward = "ResidualRmsNorm"
slang_path     = "Ml/Nn/Norm"
log_component  = "ML"
notes          = "Fused residual + RMS norm: Out = (A + B) / sqrt(mean((A+B)^2) + Eps)."
body           = "manual_context"
extra_params   = [{ name = "Eps", type = "OaF32", default = "1e-5f" }]
