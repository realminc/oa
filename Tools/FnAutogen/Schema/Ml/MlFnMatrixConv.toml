# OaFn schema — Ml/FnMatrix convolution ops (4).
#
# This is the *source of truth* for ML convolution operations. The generator
# emits .h declarations, .cpp implementations, and .slang shaders from this file.
# See Tools/FnAutogen/README.md and Tools/FnAutogen/oafnautogen.py.
#
# Convolution operations are fundamental building blocks for CNNs.
# Each has complex shape arithmetic and backward passes for both input and weights.

# --- Conv1d ------------------------------------------------------------------
[[ops]]
name           = "Conv1d"
category       = "Conv"
kind           = "binary"
kernel_forward = "Conv1d"
slang_path     = "Ml/Nn/Conv"
log_component  = "ML"
notes          = "1D convolution: Out = Conv(Input, Weight)."
body           = "manual_context"
extra_params   = [
    { name = "Stride", type = "OaI32", default = "1" },
    { name = "Padding", type = "OaI32", default = "0" },
    { name = "Dilation", type = "OaI32", default = "1" },
    { name = "Groups", type = "OaI32", default = "1" }
]

