# OaFn schema — Ml/FnMatrix optimizer ops (5).
#
# This is the *source of truth* for ML optimizer operations. The generator
# emits .h declarations, .cpp implementations, and .slang shaders from this file.
# See Tools/OaFnAutogen/oafnautogen.py and Docs/Rewrite/Opus/OaFnAutogen.md.
#
# Optimizer operations update model parameters based on gradients.
# These are in-place operations that modify the parameter tensors.

# --- Sgd ---------------------------------------------------------------------
[[ops]]
name           = "Sgd"
category       = "Optim"
kind           = "unary_scalar"
kernel_forward = "Sgd"
slang_path     = "Ml/Optim"
log_component  = "ML"
notes          = "SGD optimizer step: Param -= LearningRate * Grad."
body           = "manual_context"
scalar_param   = { name = "LearningRate", type = "OaF32", push_field = "Lr" }

# --- SgdMomentum -------------------------------------------------------------
[[ops]]
name           = "SgdMomentum"
category       = "Optim"
kind           = "binary"
kernel_forward = "SgdMomentum"
slang_path     = "Ml/Optim"
log_component  = "ML"
notes          = "SGD with momentum: Velocity = Momentum * Velocity + Grad; Param -= Lr * Velocity."
body           = "manual_context"
extra_params   = [
    { name = "Velocity", type = "OaMatrix&", default = "OaMatrix{}" },
    { name = "LearningRate", type = "OaF32", default = "0.01f" },
    { name = "Momentum", type = "OaF32", default = "0.9f" }
]

