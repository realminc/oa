# OaFn schema — Core/FnMatrix elemwise ops (17).
#
# This is the *source of truth* for these 17 ops. The generator emits:
#   - .h declarations, .cpp implementations, .slang shaders (forward ops)
#   - Autograd/Matrix/AutogradElemwise.gen.h (gradient node classes)
# See Tools/FnAutogen/oafnautogen.py and Docs/Rewrite/Opus/OaFnAutogen.md.
#
# Fields per [[ops]] entry:
#   name              op name (PascalCase, no Oa prefix — namespace adds it)
#   category          Elemwise | Blas | Reduce | Shape | Index | Activation | ...
#   kind              binary | unary | unary_scalar
#   kernel_forward    Slang shader ID — must exist in KernelRegistry.h
#   dispatch_id_macro optional: OaComputeKernelId::<Name> instead of "Name"
#                     literal in OaVkDispatch::Run (matches existing Scale)
#   log_component     OaLogComponent::* enum value
#   notes             short docstring
#   forward_op        Slang body — "a + b", "a - b", "abs(a)", "log(a)",
#                     "a * pc.Alpha", "pow(a, pc.Exponent)" — used by
#                     shader template; receives loaded scalars `a`, `b`
#                     and emits OaStore(...)
#   immediate.alias_of  optional: immediate-mode body delegates to another op
#                       (e.g. Neg → Scale(-1)) — preserves existing behavior
#   autograd.*        gradient wiring (see below)
#
# Autograd block:
#   grad_class    name of the OaGradXxx class (defined in Autograd.h or generated)
#   inputs        list of parameter names; populates SetGraphInputs in slot order
#   saved         list of saved tensor names (populates Saved_ vector)
#   ctor_args     list of expressions passed to OaMakeSharedPtr<grad_class>(...)
#   formula       "auto_elemwise" | "auto_unary" | "manual:<Op>" | "none"

# --- Add ---------------------------------------------------------------------
[[ops]]
name           = "Add"
category       = "Elemwise"
kind           = "binary"
kernel_forward = "Add"
log_component  = "ML"
notes          = "Element-wise addition: Out = A + B."
forward_op     = "a + b"
body           = "manual_context"

[ops.autograd]
grad_class = "OaGradAdd"
inputs     = ["InA", "InB"]
saved      = []
formula    = "auto_binary_add"

[ops.test]
cpu_reference = "a_host[i] + b_host[i]"
tolerance = "1e-4f"
test_sizes = [256, 1024]
edge_cases = ["zeros", "negatives"]
numerical_grad = false
benchmark = false

