# --- Scale -------------------------------------------------------------------
[[ops]]
name              = "Scale"
category          = "Elemwise"
kind              = "unary_scalar"
kernel_forward    = "Scale"
dispatch_id_macro = "Scale"             # immediate uses OaComputeKernelId::Scale
log_component     = "ML"
notes             = "Scalar multiplication: Out = A * Scalar."
forward_op        = "a * pc.Alpha"
scalar_param      = { name = "Scalar", type = "OaF32", push_field = "Alpha" }

[ops.autograd]
grad_class = "OaGradScale"
inputs     = ["InA"]
saved      = []
ctor_args  = ["InScalar"]
formula    = "auto_unary_scalar_scale"

[ops.test]
cpu_reference = "a_host[i] * kScalar"
tolerance = "1e-4f"
scalar_value = "1.5f"

# --- Neg ---------------------------------------------------------------------
[[ops]]
name           = "Neg"
category       = "Elemwise"
kind           = "unary"
kernel_forward = "Neg"
log_component  = "ML"
notes          = "Element-wise negation: Out = -A."
forward_op     = "-a"

# Neg delegates to Scale(-1) which has autograd, so Neg automatically gets gradients.
[ops.immediate]
alias_of = { op = "Scale", scalar = -1.0 }

[ops.test]
cpu_reference = "-a_host[i]"
tolerance = "1e-4f"

