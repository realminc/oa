# OaFn schema — verified Vision/FnImage filter ops.
#
# This is the *source of truth* for image filtering operations. The generator
# emits .h declarations, .cpp implementations, and .slang shaders from this file.
# See Tools/OaFnAutogen/oafnautogen.py and Docs/Rewrite/Opus/OaFnAutogen.md.
#
# Filter operations apply convolution kernels for blur, edge detection, etc.

generate_engine_overloads = true
generate_forwarders = true

# The operations below use hand-written context bodies because their graph
# lowering has multiple inputs and/or multiple dispatches. This manifest is
# still the authoritative public inventory; generated files deliberately point
# back to those implementations instead of producing an immediate path.

[[ops]]
name           = "Convolve2d"
category       = "Filter"
kind           = "binary"
kernel_forward = "ImageConvolve2d"
slang_path     = "Vision/Filter"
log_component  = "VISION"
notes          = "Same-shape NCHW 2D cross-correlation with an odd shared kernel and explicit border semantics."
body           = "manual_context"
api_params = ["const OaMatrix& InImage", "const OaMatrix& InKernel", "OaBorderMode InBorder = OaBorderMode::Reflect101", "OaF32 InBorderValue = 0.0F"]

[[ops]]
name           = "SeparableConvolve2d"
category       = "Filter"
kind           = "binary"
kernel_forward = "ImageSeparableConvolve"
slang_path     = "Vision/Filter"
log_component  = "VISION"
notes          = "Same-shape NCHW separable cross-correlation with odd horizontal and vertical kernels."
body           = "manual_context"
api_params = ["const OaMatrix& InImage", "const OaMatrix& InKernelX", "const OaMatrix& InKernelY", "OaBorderMode InBorder = OaBorderMode::Reflect101", "OaF32 InBorderValue = 0.0F"]

