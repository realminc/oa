# --- GaussianBlur ------------------------------------------------------------
[[ops]]
name           = "GaussianBlur"
category       = "Filter"
kind           = "unary"
kernel_forward = "ImageSeparableConvolve"
slang_path     = "Vision/Filter"
log_component  = "VISION"
notes          = "Gaussian blur filter with configurable kernel size and sigma."
body           = "manual_context"
api_params = ["const OaMatrix& InImage", "OaF32 InSigma", "OaU32 InKernelSize = 0"]
extra_params   = [
    { name = "KernelSize", type = "OaU32", default = "5" },
    { name = "Sigma", type = "OaF32", default = "1.0f" }
]

# Canny.slang remains a private experiment. Its current in-place NMS ordering
# and one-step hysteresis are not a valid public algorithm.

