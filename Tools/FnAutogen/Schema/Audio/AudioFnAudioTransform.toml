# OaFn schema — semantic Audio feature transforms.
#
# Input rate and layout come from OaAudio. Feature outputs are numerical
# matrices and therefore intentionally do not pretend to remain audio values.

[[ops]]
name = "Stft"
category = "Transform"
kind = "unary"
body = "manual_context"
kernel_forward = "Stft"
notes = "Short-time Fourier magnitude transform to [Channels, Frames, Bins]."
api_return = "OaMatrix"
api_params = [
    "const OaAudio& InAudio",
    "const OaStftConfig& InCfg = {}",
]

[ops.contract]
input_kinds = ["audio"]
output_kinds = ["matrix"]
shape_rule = "explicit"
dtype_rule = "match_input"
effects = ["read_inputs", "write_outputs"]
mutated_inputs = []
output_alias_inputs = [-1]
control_flow = "straight_line"
differentiation = "none"
lowering = "dispatch"

[[ops]]
name = "MelSpectrogram"
category = "Transform"
kind = "unary"
body = "manual_context"
kernel_forward = "MelFilterbank"
notes = "Mel feature matrix in [Channels, NumMels, Frames] layout."
api_return = "OaMatrix"
api_params = [
    "const OaAudio& InAudio",
    "const OaMelConfig& InCfg = {}",
]

[ops.contract]
input_kinds = ["audio"]
output_kinds = ["matrix"]
shape_rule = "explicit"
dtype_rule = "match_input"
effects = ["read_inputs", "write_outputs"]
mutated_inputs = []
output_alias_inputs = [-1]
control_flow = "straight_line"
differentiation = "none"
lowering = "dispatch"

[[ops]]
name = "Mfcc"
category = "Transform"
kind = "unary"
body = "manual_context"
notes = "Orthonormal DCT-II coefficients of the log-mel feature matrix."
api_return = "OaMatrix"
api_params = [
    "const OaAudio& InAudio",
    "const OaMfccConfig& InCfg = {}",
]

[ops.contract]
input_kinds = ["audio"]
output_kinds = ["matrix"]
shape_rule = "explicit"
dtype_rule = "match_input"
effects = ["read_inputs", "write_outputs"]
mutated_inputs = []
output_alias_inputs = [-1]
control_flow = "straight_line"
differentiation = "none"
lowering = "dispatch"
