# OaFn schema — semantic Audio signal operations.
#
# These schemas own the public declarations and operation contracts. Their
# private implementations validate OaAudio metadata and either compose verified
# matrix operations or dispatch the named Audio kernel.

[[ops]]
name = "Normalize"
category = "Signal"
kind = "unary"
body = "manual_context"
notes = "Peak or RMS normalization to a target dB level while preserving audio metadata."
api_return = "OaAudio"
api_params = [
    "const OaAudio& InAudio",
    "OaF32 InTargetDb = -3.0F",
    "OaU8 InMode = 0",
]

[ops.contract]
input_kinds = ["audio"]
output_kinds = ["audio"]
shape_rule = "match_input"
dtype_rule = "match_input"
effects = ["read_inputs", "write_outputs"]
mutated_inputs = []
output_alias_inputs = [-1]
control_flow = "straight_line"
differentiation = "none"
lowering = "dispatch"

[[ops]]
name = "Resample"
category = "Signal"
kind = "unary"
body = "manual_context"
kernel_forward = "AudioResample"
notes = "Windowed-sinc resampling with sample rate derived from the input audio value."
api_return = "OaAudio"
api_params = [
    "const OaAudio& InAudio",
    "OaU32 InOutRate = 16'000U",
    "OaU32 InFilterHalfWidth = 64U",
]

[ops.contract]
input_kinds = ["audio"]
output_kinds = ["audio"]
shape_rule = "explicit"
dtype_rule = "match_input"
effects = ["read_inputs", "write_outputs"]
mutated_inputs = []
output_alias_inputs = [-1]
control_flow = "straight_line"
differentiation = "none"
lowering = "dispatch"

[[ops]]
name = "Gain"
