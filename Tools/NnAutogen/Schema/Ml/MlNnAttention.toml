# Oa NN schema - attention layers.

[[layers]]
name = "MultiHeadAttention"
path = "Attention/MultiHeadAttention"
constructor_args = "OaI32 DModel, OaI32 NumHeads, OaF32 DropoutP = 0.0f, bool InBias = true, OaAttentionBackend InBackend = OaAttentionBackend::Auto, OaAttentionMode InMode = OaAttentionMode::Causal"
constructor_init = "DModel_(DModel), NumHeads_(NumHeads), HeadDim_(DModel / NumHeads), DropoutP_(DropoutP), Backend_(InBackend), Mode_(InMode)"
constructor_body = [
	"if (DModel <= 0 || NumHeads <= 0 || DModel % NumHeads != 0) throw std::invalid_argument(\"MultiHeadAttention requires DModel divisible by NumHeads\");",
	"QProj_ = OaMakeSharedPtr<OaLinear>(DModel, DModel, InBias);",
	"KProj_ = OaMakeSharedPtr<OaLinear>(DModel, DModel, InBias);",
	"VProj_ = OaMakeSharedPtr<OaLinear>(DModel, DModel, InBias);",
	"OutProj_ = OaMakeSharedPtr<OaLinear>(DModel, DModel, InBias);",
	"RegisterModule(\"q_proj\", QProj_);",
	"RegisterModule(\"k_proj\", KProj_);",
	"RegisterModule(\"v_proj\", VProj_);",
	"RegisterModule(\"out_proj\", OutProj_);",
]
members = [
	"OaI32 DModel_;",
	"OaI32 NumHeads_;",
	"OaI32 HeadDim_;",
	"OaF32 DropoutP_;",
	"OaAttentionBackend Backend_;",
	"OaAttentionBackend LastBackend_ = OaAttentionBackend::Standard;",
	"OaAttentionMode Mode_;",
	"OaSharedPtr<OaModule> QProj_;",
	"OaSharedPtr<OaModule> KProj_;",
	"OaSharedPtr<OaModule> VProj_;",
	"OaSharedPtr<OaModule> OutProj_;",
	"OaI32 SeqLen_ = 0;",
	"OaMatrix Mask_;",
	"OaI32 MaskSeqLen_ = 0;",
	"OaI32 MaskBatch_ = 0;",
	"OaAttentionMode MaskMode_ = OaAttentionMode::Causal;",
	"OaVec<OaMatrix> ProjectQkv(const OaMatrix& InInput);",
	"const OaMatrix& AttentionMask(OaI32 InBatch);",
	"OaMatrix ForwardStandard(const OaMatrix& InInput, const OaMatrix& InAdditiveMask);",
	"OaMatrix ForwardFlash(const OaMatrix& InInput);",
	"[[nodiscard]] bool CanUseFlash(const OaMatrix& InInput) const noexcept;",
]
methods = [
	"void SetSeqLen(OaI32 InSeqLen) { SeqLen_ = InSeqLen; Mask_ = {}; MaskSeqLen_ = 0; MaskBatch_ = 0; }",
	"OaMatrix ForwardMasked(const OaMatrix& InInput, const OaMatrix& InAdditiveMask);",
	"[[nodiscard]] OaI32 NumHeads() const noexcept { return NumHeads_; }",
	"[[nodiscard]] OaI32 HeadDim() const noexcept { return HeadDim_; }",
	"void SetBackend(OaAttentionBackend InBackend) noexcept { Backend_ = InBackend; }",
	"[[nodiscard]] OaAttentionBackend Backend() const noexcept { return Backend_; }",
	"[[nodiscard]] OaAttentionBackend LastBackend() const noexcept { return LastBackend_; }",
	"void SetMode(OaAttentionMode InMode) noexcept { Mode_ = InMode; Mask_ = {}; MaskSeqLen_ = 0; MaskBatch_ = 0; }",
	"[[nodiscard]] OaAttentionMode Mode() const noexcept { return Mode_; }",
]
forward_body = """
if (SeqLen_ <= 0) throw std::invalid_argument("MultiHeadAttention requires SetSeqLen before Forward");
const bool requestFlash = Mode_ == OaAttentionMode::Causal &&
	(Backend_ == OaAttentionBackend::Flash ||
		(Backend_ == OaAttentionBackend::Auto && !OaFnAutograd::IsEnabled()));
if (requestFlash && CanUseFlash(InInput)) return ForwardFlash(InInput);
if (Backend_ == OaAttentionBackend::Flash) {
	throw std::invalid_argument("FlashAttention requires causal mode, FP32, dropout=0 and sequence length <= 1024");
}
LastBackend_ = OaAttentionBackend::Standard;
return ForwardStandard(InInput, AttentionMask(static_cast<OaI32>(InInput.Size(0) / SeqLen_)));
"""
extra_methods = """
OaVec<OaMatrix> OaMultiHeadAttention::ProjectQkv(const OaMatrix& InInput) {
	auto& q = QProj_->Parameters();
	auto& k = KProj_->Parameters();
	auto& v = VProj_->Parameters();
	const bool hasBias = q.Size() > 1 && k.Size() > 1 && v.Size() > 1;
	auto packed = hasBias
		? OaFnMatrix::PackedLinear3(InInput, q[0].Data, k[0].Data, v[0].Data,
			q[1].Data, k[1].Data, v[1].Data)
		: OaFnMatrix::PackedLinear3(InInput, q[0].Data, k[0].Data, v[0].Data);
	OaI64 sizes[] = {DModel_, DModel_, DModel_};
	return OaFnMatrix::Split(packed, OaSpan<OaI64>(sizes, 3), 1);
}

bool OaMultiHeadAttention::CanUseFlash(const OaMatrix& InInput) const noexcept {
	return InInput.GetDtype() == OaScalarType::Float32 && DropoutP_ == 0.0F &&
		SeqLen_ > 0 && SeqLen_ <= 1024;
}

const OaMatrix& OaMultiHeadAttention::AttentionMask(OaI32 InBatch) {
	if (InBatch <= 0) throw std::invalid_argument("MultiHeadAttention batch must be positive");
	if (Mask_.IsEmpty() || MaskSeqLen_ != SeqLen_ || MaskBatch_ != InBatch ||
		MaskMode_ != Mode_) {
		const OaI64 rows = static_cast<OaI64>(InBatch) * NumHeads_ * SeqLen_;
		const OaI64 batchHeads = static_cast<OaI64>(InBatch) * NumHeads_;
		auto mask = OaFnMatrix::Zeros(
			OaMatrixShape{batchHeads, SeqLen_, SeqLen_}, OaScalarType::Float32);
		if (Mode_ == OaAttentionMode::Causal) mask = OaFnMatrix::CausalMask(mask);
		Mask_ = mask.Reshape(OaMatrixShape{rows, SeqLen_});
		MaskSeqLen_ = SeqLen_;
		MaskBatch_ = InBatch;
		MaskMode_ = Mode_;
	}
	return Mask_;
}

OaMatrix OaMultiHeadAttention::ForwardMasked(
	const OaMatrix& InInput, const OaMatrix& InAdditiveMask) {
	if (Backend_ == OaAttentionBackend::Flash) {
		throw std::invalid_argument("FlashAttention does not accept an arbitrary additive mask");
	}
	LastBackend_ = OaAttentionBackend::Standard;
	return ForwardStandard(InInput, InAdditiveMask);
}

OaMatrix OaMultiHeadAttention::ForwardStandard(
	const OaMatrix& InInput, const OaMatrix& InAdditiveMask) {
	if (InInput.Rank() != 2 || InInput.Size(1) != DModel_ || SeqLen_ <= 0 ||
		InInput.Size(0) % SeqLen_ != 0) {
		throw std::invalid_argument("MultiHeadAttention expects [B*S,D] with a configured sequence length");
	}
	const OaI32 batch = static_cast<OaI32>(InInput.Size(0) / SeqLen_);
	const OaI64 scoreRows = static_cast<OaI64>(batch) * NumHeads_ * SeqLen_;
	if (InAdditiveMask.Rank() != 2 || InAdditiveMask.Size(0) != scoreRows ||
		InAdditiveMask.Size(1) != SeqLen_) {
		throw std::invalid_argument("MultiHeadAttention additive mask must be [B*H*S,S]");
	}

	auto qkv = ProjectQkv(InInput);
	auto q = OaFnMatrix::SplitHeads(qkv[0], batch, SeqLen_, NumHeads_);
	auto k = OaFnMatrix::SplitHeads(qkv[1], batch, SeqLen_, NumHeads_);
	auto v = OaFnMatrix::SplitHeads(qkv[2], batch, SeqLen_, NumHeads_);
	auto scores = OaFnMatrix::Bmm(q, OaFnMatrix::Transpose(k, 1, 2));
	auto attn = OaFnMatrix::SoftmaxScaledMasked(
		scores.Reshape(OaMatrixShape{scoreRows, SeqLen_}), InAdditiveMask,
		1.0F / std::sqrt(static_cast<OaF32>(HeadDim_)));
	if (IsTraining() && DropoutP_ > 0.0F) {
		attn = OaFnMatrix::Dropout(attn, DropoutP_);
	}
	auto context = OaFnMatrix::Bmm(
		attn.Reshape(OaMatrixShape{static_cast<OaI64>(batch) * NumHeads_, SeqLen_, SeqLen_}), v);
	auto merged = OaFnMatrix::MergeHeads(context, batch, SeqLen_, NumHeads_);
	return OutProj_->Forward(merged);
}

OaMatrix OaMultiHeadAttention::ForwardFlash(const OaMatrix& InInput) {
	if (InInput.Rank() != 2 || InInput.Size(1) != DModel_ || SeqLen_ <= 0 ||
		InInput.Size(0) % SeqLen_ != 0) {
		throw std::invalid_argument("MultiHeadAttention expects [B*S,D] with a configured sequence length");
	}
	const OaI32 batch = static_cast<OaI32>(InInput.Size(0) / SeqLen_);
	auto qkv = ProjectQkv(InInput);
	auto q = OaFnMatrix::SplitHeads(qkv[0], batch, SeqLen_, NumHeads_);
	auto k = OaFnMatrix::SplitHeads(qkv[1], batch, SeqLen_, NumHeads_);
	auto v = OaFnMatrix::SplitHeads(qkv[2], batch, SeqLen_, NumHeads_);
	auto context = OaFnMatrix::FlashAttentionCausal(
		q, k, v, 1.0F / std::sqrt(static_cast<OaF32>(HeadDim_)));
	auto merged = OaFnMatrix::MergeHeads(context, batch, SeqLen_, NumHeads_);
	LastBackend_ = OaAttentionBackend::Flash;
	return OutProj_->Forward(merged);
}

"""
notes = "Multi-head scaled dot-product self-attention with explicit causal/bidirectional visibility and interchangeable standard/fused causal Flash backends."
extra_includes = """
#include <Oa/Ml/Autograd.h>
#include <Oa/Ml/FnMatrix.h>
#include <Oa/Runtime/Context.h>
#include <cmath>
#include <stdexcept>
"""
