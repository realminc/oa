	{ name = "TensorCore", value = 2, comment = "Tensor Core kernel" },
	{ name = "Wmma", value = 3, comment = "WMMA kernel" },
	{ name = "VendorBlas", value = 4, comment = "external vendor BLAS (comparison slot; not built)" },
]

[[enums]]
