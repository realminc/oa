# OA Runtime Types Schema
# GPU and runtime types for the OA Runtime module

domain = "Runtime"
namespace = "Oa"

[[enums]]
name = "OaShaderProviderMode"
underlying_type = "OaU8"
generate_tostring = true
generate_fromstring = true
values = [
	{ name = "Disk", value = 0, comment = "Load shaders from disk" },
	{ name = "Embedded", value = 1, comment = "Use embedded shaders" },
	{ name = "Cache", value = 2, comment = "Use shader cache" },
]

[[enums]]
name = "OaStoragePrecision"
underlying_type = "OaU8"
generate_tostring = true
generate_fromstring = true
values = [
	{ name = "Unknown", value = 0, comment = "Unknown precision" },
	{ name = "FP32", value = 1, comment = "FP32 storage" },
	{ name = "FP16", value = 2, comment = "FP16 storage" },
	{ name = "BF16", value = 3, comment = "BF16 storage" },
	{ name = "INT8", value = 4, comment = "INT8 storage" },
	{ name = "TF32", value = 5, comment = "TF32 storage" },
]

[[enums]]
name = "OaGemmKernel"
