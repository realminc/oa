underlying_type = "OaU8"
generate_tostring = true
generate_fromstring = true
values = [
	{ name = "None", value = 0, comment = "No activation" },
	{ name = "Relu", value = 1, comment = "ReLU" },
	{ name = "Gelu", value = 2, comment = "GELU" },
	{ name = "Sigmoid", value = 3, comment = "Sigmoid" },
	{ name = "Tanh", value = 4, comment = "Tanh" },
	{ name = "Silu", value = 5, comment = "SiLU (Swish)" },
	{ name = "Mish", value = 6, comment = "Mish" },
	{ name = "LeakyRelu", value = 7, comment = "Leaky ReLU" },
	{ name = "Elu", value = 8, comment = "ELU" },
	{ name = "Selu", value = 9, comment = "SELU" },
]

